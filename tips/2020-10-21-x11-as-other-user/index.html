			<h1>
        X11 as another user
      </h1>
<section><h1 id="what">
        <a href="#what" class="anchor"><span>></span></a>What
      </h1>
<div class="language-bash highlighter-rouge"><div class="highlight"><pre class="highlight"><code>xauth add <span class="si">$(</span>xauth <span class="nt">-f</span> ~<span class="k">${</span><span class="nv">user</span><span class="k">}</span>/.Xauthority list | <span class="nb">tail</span> <span class="nt">-1</span><span class="si">)</span>
</code></pre></div></div><h1 id="why">
        <a href="#why" class="anchor"><span>></span></a>Why
      </h1>
<p>So that you can run X11 when you are logged in as another user (e.g. root).</p>
